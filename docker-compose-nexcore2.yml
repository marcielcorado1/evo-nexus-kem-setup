# ================================================================
# NEXCORE Stack — TESTE / nexcore2
# ================================================================
# Stack paralela para testes na mesma VPS.
# Containers, volumes e routers Traefik usam prefixo "nexcore2_"
# para nao conflitar com a stack principal (nexcore_*).
#
# Dominio: nexcore2.kemsolucoes.com.br
# ================================================================

services:
  nexcore2_dashboard:
    image: 'evoapicloud/evo-nexus-dashboard:latest'
    container_name: nexcore2_dashboard
    restart: unless-stopped
    environment:
      - TZ=America/Sao_Paulo
      - EVONEXUS_PORT=8080
      - TERMINAL_SERVER_PORT=32352
      - 'FORWARDED_ALLOW_IPS=*'
      - CLAUDE_DANGEROUSLY_SKIP_PERMISSIONS=1
    volumes:
      - 'nexcore2_config:/workspace/config'
      - 'nexcore2_workspace:/workspace/workspace'
      - 'nexcore2_dashboard_data:/workspace/dashboard/data'
      - 'nexcore2_memory:/workspace/memory'
      - 'nexcore2_adw_logs:/workspace/ADWs/logs'
      - 'nexcore2_adw_custom:/workspace/ADWs/routines/custom'
      - 'nexcore2_agents_custom:/workspace/.claude/agents'
      - 'nexcore2_skills_custom:/workspace/.claude/skills'
      - 'nexcore2_commands_custom:/workspace/.claude/commands'
      - 'nexcore2_templates:/workspace/.claude/templates'
      - 'nexcore2_rules:/workspace/.claude/rules'
      - 'nexcore2_hooks:/workspace/.claude/hooks'
      - 'nexcore2_agent_memory:/workspace/.claude/agent-memory'
      - 'nexcore2_claude_auth:/root/.claude'
      - 'nexcore2_codex_auth:/root/.codex'
      - 'nexcore2_terminal_sessions:/root/.claude-code-web'
    networks:
      - coolify
    mem_limit: 8192m
    cpus: 4
    healthcheck:
      test:
        - CMD-SHELL
        - 'curl -sf http://localhost:8080/api/health || exit 1'
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    labels:
      - traefik.enable=true
      - traefik.docker.network=coolify
      - traefik.http.routers.nexcore2_dashboard.rule=Host(`nexcore2.kemsolucoes.com.br`)
      - traefik.http.routers.nexcore2_dashboard.entrypoints=https
      - traefik.http.routers.nexcore2_dashboard.priority=1
      - traefik.http.routers.nexcore2_dashboard.tls=true
      - traefik.http.routers.nexcore2_dashboard.tls.certresolver=letsencrypt
      - traefik.http.routers.nexcore2_dashboard.service=nexcore2_dashboard
      - traefik.http.services.nexcore2_dashboard.loadbalancer.server.port=8080
      - traefik.http.services.nexcore2_dashboard.loadbalancer.passHostHeader=true
      - 'traefik.http.routers.nexcore2_terminal.rule=Host(`nexcore2.kemsolucoes.com.br`) && PathPrefix(`/terminal`)'
      - traefik.http.routers.nexcore2_terminal.entrypoints=https
      - traefik.http.routers.nexcore2_terminal.priority=10
      - traefik.http.routers.nexcore2_terminal.tls=true
      - traefik.http.routers.nexcore2_terminal.tls.certresolver=letsencrypt
      - traefik.http.routers.nexcore2_terminal.service=nexcore2_terminal
      - traefik.http.routers.nexcore2_terminal.middlewares=nexcore2_terminal_strip
      - traefik.http.middlewares.nexcore2_terminal_strip.stripprefix.prefixes=/terminal
      - traefik.http.services.nexcore2_terminal.loadbalancer.server.port=32352
      - traefik.http.services.nexcore2_terminal.loadbalancer.passHostHeader=true

  nexcore2_social_auth:
    image: 'evoapicloud/evo-nexus-dashboard:latest'
    container_name: nexcore2_social_auth
    restart: unless-stopped
    command:
      - uv
      - run
      - python
      - /workspace/workspace/arquivos/start-social-auth.py
    environment:
      - TZ=America/Sao_Paulo
      - SOCIAL_AUTH_PORT=8765
    volumes:
      - 'nexcore2_workspace:/workspace/workspace'
      - 'nexcore2_config:/workspace/config'
      - 'nexcore2_claude_auth:/root/.claude'
    networks:
      - coolify
    mem_limit: 512m
    cpus: 1
    healthcheck:
      test:
        - CMD-SHELL
        - 'curl -s http://localhost:8765/ > /dev/null 2>&1 || exit 1'
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    labels:
      - traefik.enable=true
      - traefik.docker.network=coolify
      - 'traefik.http.routers.nexcore2_social_auth.rule=Host(`nexcore2.kemsolucoes.com.br`) && PathPrefix(`/social-auth`)'
      - traefik.http.routers.nexcore2_social_auth.entrypoints=https
      - traefik.http.routers.nexcore2_social_auth.priority=20
      - traefik.http.routers.nexcore2_social_auth.tls=true
      - traefik.http.routers.nexcore2_social_auth.tls.certresolver=letsencrypt
      - traefik.http.routers.nexcore2_social_auth.service=nexcore2_social_auth
      - traefik.http.routers.nexcore2_social_auth.middlewares=nexcore2_social_auth_strip
      - traefik.http.middlewares.nexcore2_social_auth_strip.stripprefix.prefixes=/social-auth
      - traefik.http.services.nexcore2_social_auth.loadbalancer.server.port=8765
      - traefik.http.services.nexcore2_social_auth.loadbalancer.passHostHeader=true

  nexcore2_telegram:
    image: 'evoapicloud/evo-nexus-runtime:latest'
    container_name: nexcore2_telegram
    restart: unless-stopped
    command:
      - claude
      - '--channels'
      - 'plugin:telegram@claude-plugins-official'
      - '--dangerously-skip-permissions'
    environment:
      - TZ=America/Sao_Paulo
      - REQUIRE_ANTHROPIC_KEY=1
    stdin_open: true
    tty: true
    volumes:
      - 'nexcore2_config:/workspace/config'
      - 'nexcore2_workspace:/workspace/workspace'
      - 'nexcore2_memory:/workspace/memory'
      - 'nexcore2_adw_logs:/workspace/ADWs/logs'
      - 'nexcore2_adw_custom:/workspace/ADWs/routines/custom'
      - 'nexcore2_agents_custom:/workspace/.claude/agents'
      - 'nexcore2_skills_custom:/workspace/.claude/skills'
      - 'nexcore2_commands_custom:/workspace/.claude/commands'
      - 'nexcore2_templates:/workspace/.claude/templates'
      - 'nexcore2_rules:/workspace/.claude/rules'
      - 'nexcore2_hooks:/workspace/.claude/hooks'
      - 'nexcore2_agent_memory:/workspace/.claude/agent-memory'
      - 'nexcore2_claude_auth:/root/.claude'
      - 'nexcore2_codex_auth:/root/.codex'
    networks:
      - coolify
    mem_limit: 4096m
    cpus: 4
    healthcheck:
      test:
        - CMD-SHELL
        - 'test -d /proc/1 || exit 1'
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 60s

  nexcore2_scheduler:
    image: 'evoapicloud/evo-nexus-runtime:latest'
    container_name: nexcore2_scheduler
    restart: on-failure
    command:
      - /bin/bash
      - /workspace/workspace/arquivos/scheduler-startup.sh
    environment:
      - TZ=America/Sao_Paulo
      - CLAUDE_DANGEROUSLY_SKIP_PERMISSIONS=1
    volumes:
      - 'nexcore2_config:/workspace/config'
      - 'nexcore2_workspace:/workspace/workspace'
      - 'nexcore2_memory:/workspace/memory'
      - 'nexcore2_adw_logs:/workspace/ADWs/logs'
      - 'nexcore2_adw_custom:/workspace/ADWs/routines/custom'
      - 'nexcore2_agents_custom:/workspace/.claude/agents'
      - 'nexcore2_skills_custom:/workspace/.claude/skills'
      - 'nexcore2_commands_custom:/workspace/.claude/commands'
      - 'nexcore2_templates:/workspace/.claude/templates'
      - 'nexcore2_rules:/workspace/.claude/rules'
      - 'nexcore2_hooks:/workspace/.claude/hooks'
      - 'nexcore2_agent_memory:/workspace/.claude/agent-memory'
      - 'nexcore2_codex_auth:/root/.codex'
      - 'nexcore2_claude_auth:/root/.claude'
    networks:
      - coolify
    mem_limit: 4096m
    cpus: 4
    healthcheck:
      test:
        - CMD-SHELL
        - 'test -d /proc/1 || exit 1'
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 60s

volumes:
  nexcore2_config: null
  nexcore2_workspace: null
  nexcore2_dashboard_data: null
  nexcore2_memory: null
  nexcore2_adw_logs: null
  nexcore2_adw_custom: null
  nexcore2_agents_custom: null
  nexcore2_skills_custom: null
  nexcore2_commands_custom: null
  nexcore2_templates: null
  nexcore2_rules: null
  nexcore2_hooks: null
  nexcore2_agent_memory: null
  nexcore2_claude_auth: null
  nexcore2_codex_auth: null
  nexcore2_terminal_sessions: null

networks:
  coolify:
    external: true
    name: coolify
