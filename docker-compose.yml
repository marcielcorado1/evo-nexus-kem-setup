version: '3.8'

# ================================================================
# EvoNexus Stack — Kem Setup
# ================================================================
#
# Deploy via Coolify:
# 1. Copie este arquivo inteiro
# 2. Cole no Coolify → Services → Compose
# 3. Defina UMA variável: DOMAIN (seu domínio)
# 4. Clique em Deploy
#
# Pronto! Tudo mais já está pré-configurado.
#
# ================================================================

services:
  evonexus_dashboard:
    image: evoapicloud/evo-nexus-dashboard:latest
    container_name: evonexus_dashboard
    restart: unless-stopped
    environment:
      # Fuso Horário (América/São Paulo)
      TZ: America/Sao_Paulo

      # Porta do Dashboard (interna)
      EVONEXUS_PORT: 8080

      # Porta do Terminal Server (interna)
      TERMINAL_SERVER_PORT: 32352

      # URL pública para redirecionamento OAuth (autenticação social)
      NGROK_URL: https://${DOMAIN}/social-auth

      # Chave secreta da sessão (segurança)
      EVONEXUS_SECRET_KEY: HVwxeWjBxn0VWKQnVNFCbyf4DyHH5WkclXyI4g9HpG0

      # Token da API do Dashboard (para agentes acessarem)
      DASHBOARD_API_TOKEN: EwB23pNygH6JJinQY3YltVkVgHE5msqcZM_g5RbXYmB

      # Origens CORS permitidas (controla quem pode acessar a API)
      CORS_ALLOWED_ORIGINS: https://${DOMAIN}

      # URL interna da API (nome do serviço Docker)
      EVONEXUS_API_URL: http://evonexus_dashboard:8080

    volumes:
      # ═══════════════════════════════════════════════════════════
      # 15 volumes persistentes — seus dados sobrevivem a restarts
      # ═══════════════════════════════════════════════════════════

      # Configuração da stack
      - evonexus_config:/workspace/config

      # Workspace — arquivos de trabalho dos agentes
      - evonexus_workspace:/workspace/workspace

      # Banco de dados do Dashboard
      - evonexus_dashboard_data:/dashboard/data

      # Memória dos agentes (persistem entre sessões)
      - evonexus_memory:/workspace/memory

      # Logs de execução
      - evonexus_logs:/workspace/ADWs/logs

      # Scripts de rotinas customizadas
      - evonexus_routines:/workspace/ADWs/routines

      # Definições dos 38 agentes
      - evonexus_agents:/workspace/.claude/agents

      # 175+ skills (automações)
      - evonexus_skills:/workspace/.claude/skills

      # Comandos slash (como /clawdia, /flux, etc.)
      - evonexus_commands:/workspace/.claude/commands

      # Templates HTML/Markdown
      - evonexus_templates:/workspace/.claude/templates

      # Regras de comportamento dos agentes
      - evonexus_rules:/workspace/.claude/rules

      # Git hooks customizados
      - evonexus_hooks:/workspace/.claude/hooks

      # Memória privada de cada agente
      - evonexus_agent_memory:/workspace/.claude/agent-memory

      # Autenticação Claude Code
      - evonexus_claude_auth:/.claude-code-web/auth

      # Autenticação Codex
      - evonexus_codex_auth:/.codex-auth

    ports:
      # Dashboard Web UI + API
      - "8080:8080"
      # Terminal Server
      - "32352:32352"

    networks:
      # Rede externa criada pelo Coolify (mesmo nome da stack)
      - coolify

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

    labels:
      # Configuração automática do Traefik (roteamento)
      traefik.enable: "true"
      traefik.http.routers.evonexus-dashboard.rule: "Host(`${DOMAIN}`)"
      traefik.http.routers.evonexus-dashboard.entrypoints: "websecure"
      traefik.http.routers.evonexus-dashboard.tls.certresolver: "letsencrypt"
      traefik.http.services.evonexus-dashboard.loadbalancer.server.port: "8080"
      traefik.http.routers.evonexus-dashboard.middlewares: "gzip"
      traefik.http.middlewares.gzip.compress: "true"

  evonexus_social_auth:
    image: evoapicloud/evo-nexus-dashboard:latest
    container_name: evonexus_social_auth
    restart: unless-stopped
    environment:
      TZ: America/Sao_Paulo
      OAUTH_MODE: "true"
      NGROK_URL: https://${DOMAIN}/social-auth

    ports:
      # Servidor OAuth (Instagram, YouTube, LinkedIn)
      - "8765:8765"

    networks:
      - coolify

    labels:
      # Roteamento para OAuth
      traefik.enable: "true"
      traefik.http.routers.evonexus-oauth.rule: "Host(`${DOMAIN}`) && PathPrefix(`/social-auth`)"
      traefik.http.routers.evonexus-oauth.entrypoints: "websecure"
      traefik.http.routers.evonexus-oauth.tls.certresolver: "letsencrypt"
      traefik.http.services.evonexus-oauth.loadbalancer.server.port: "8765"

  evonexus_telegram:
    image: evoapicloud/evo-nexus-dashboard:latest
    container_name: evonexus_telegram
    restart: unless-stopped
    environment:
      TZ: America/Sao_Paulo
      TELEGRAM_MODE: "true"

    ports:
      # Bot Telegram
      - "8766:8766"

    networks:
      - coolify

  evonexus_scheduler:
    image: evoapicloud/evo-nexus-runtime:latest
    container_name: evonexus_scheduler
    restart: unless-stopped
    environment:
      TZ: America/Sao_Paulo
      SCHEDULER_MODE: "true"
      # URL interna para acessar o Dashboard
      EVONEXUS_API_URL: http://evonexus_dashboard:8080

    volumes:
      # Scheduler precisa de acesso aos arquivos de trabalho
      - evonexus_config:/workspace/config
      - evonexus_workspace:/workspace/workspace
      - evonexus_memory:/workspace/memory
      - evonexus_logs:/workspace/ADWs/logs
      - evonexus_routines:/workspace/ADWs/routines
      - evonexus_agents:/workspace/.claude/agents
      - evonexus_skills:/workspace/.claude/skills
      - evonexus_commands:/workspace/.claude/commands
      - evonexus_templates:/workspace/.claude/templates
      - evonexus_rules:/workspace/.claude/rules
      - evonexus_agent_memory:/workspace/.claude/agent-memory

    networks:
      - coolify

# ═══════════════════════════════════════════════════════════════════
# VOLUMES PERSISTENTES
# ═══════════════════════════════════════════════════════════════════
# Todos os volumes abaixo são persistidos no Docker host
# Seus dados sobrevivem a:
#   - Restart do container
#   - Atualização de imagem
#   - Redeployment da stack
# ═══════════════════════════════════════════════════════════════════

volumes:
  evonexus_config:
  evonexus_workspace:
  evonexus_dashboard_data:
  evonexus_memory:
  evonexus_logs:
  evonexus_routines:
  evonexus_agents:
  evonexus_skills:
  evonexus_commands:
  evonexus_templates:
  evonexus_rules:
  evonexus_hooks:
  evonexus_agent_memory:
  evonexus_claude_auth:
  evonexus_codex_auth:

# ═══════════════════════════════════════════════════════════════════
# REDES
# ═══════════════════════════════════════════════════════════════════

networks:
  coolify:
    # Rede externa criada pelo Coolify
    # Certifique-se de que a rede existe:
    # docker network create coolify
    external: true
